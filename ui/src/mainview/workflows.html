<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Workflows</title>
    <link rel="stylesheet" href="workflows.css" />
  </head>
  <body style="overflow: hidden">
    <!-- No main body scroll -->
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span>OA - <span id="commit-label">Loading context...</span></span>
      </div>
      <div
        id="dtu-status"
        class="status-badge status-Unknown"
        style="cursor: pointer; user-select: none"
      >
        DTU: Checking...
      </div>
    </div>

    <div class="pane-container animate-fade-in">
      <!-- Left Pane: Workflows -->
      <div class="pane-left">
        <div class="pane-header">
          <h2 style="font-size: 16px; margin: 0">History for Context</h2>
        </div>
        <div
          id="workflows-list"
          style="padding: 16px; display: flex; flex-direction: column; gap: 8px"
        >
          <!-- JS Output for getWorkflowsForCommit -->
        </div>

        <div
          class="pane-header"
          style="margin-top: auto; border-top: 1px solid var(--panel-border); border-bottom: none"
        >
          <h2 style="font-size: 16px; margin: 0; margin-bottom: 8px">Run New Workflow</h2>
          <div id="available-workflows" style="display: flex; flex-direction: column; gap: 8px">
            <!-- JS Output for getWorkflows (to run something new) -->
          </div>
        </div>
      </div>

      <!-- Right Pane: Logs -->
      <div class="pane-right">
        <div
          class="pane-header"
          style="display: flex; justify-content: space-between; align-items: center"
        >
          <h2 id="run-title" style="font-size: 16px; margin: 0">Select a Run</h2>
          <div style="display: flex; gap: 8px">
            <span id="run-status" class="status-badge" style="display: none"></span>
            <button
              id="stop-run-btn"
              class="btn"
              style="display: none; height: 24px; padding: 0 8px; font-size: 12px"
            >
              Stop Run
            </button>
          </div>
        </div>
        <div id="logs-viewer" class="log-viewer">Select a run from the left to view logs...</div>
      </div>
    </div>
    <script src="workflows.js"></script>
  </body>
</html>
