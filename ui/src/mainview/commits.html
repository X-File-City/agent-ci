<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Commits</title>
    <link rel="stylesheet" href="commits.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span>OA - Runs (Commits)</span>
      </div>
      <div
        id="dtu-status"
        class="status-badge status-Unknown"
        style="cursor: pointer; user-select: none"
      >
        DTU: Checking...
      </div>
    </div>
    <div class="content animate-fade-in">
      <div style="margin-bottom: 24px">
        <h1 id="project-name-display">Project Name</h1>
        <div style="color: var(--text-secondary); margin-top: 4px">Select a run context below</div>
      </div>
      <div id="commits-list" style="display: flex; flex-direction: column; gap: 8px">
        <!-- Populated by JS -->
      </div>
    </div>
    <script src="commits.js"></script>
  </body>
</html>
