<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Projects</title>
    <link rel="stylesheet" href="projects.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <span>OA - Select Project</span>
      <div
        id="dtu-status"
        class="status-badge status-Unknown"
        style="cursor: pointer; user-select: none"
      >
        DTU: Checking...
      </div>
    </div>
    <div class="content animate-fade-in">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 24px;
        "
      >
        <h1>Recent Projects</h1>
        <button id="select-project-btn" class="btn btn-primary">Open Project...</button>
      </div>
      <div id="recent-projects-list" style="display: flex; flex-direction: column; gap: 8px">
        <!-- Populated by JS -->
      </div>
    </div>
    <script src="projects.js"></script>
  </body>
</html>
